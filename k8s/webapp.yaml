apiVersion: apps/v1
kind: Deployment
metadata:
  name: football-webapp
spec:
  replicas: 2
  selector:
    matchLabels:
      app: football-webapp
  template:
    metadata:
      labels:
        app: football-webapp
    spec:
      containers:
        - name: webapp
          image: football-webapp:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000
          env:
            - name: POSTGRES_HOST
              value: postgres
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
---
apiVersion: v1
kind: Service
metadata:
  name: football-webapp
spec:
  selector:
    app: football-webapp
  ports:
    - port: 80
      targetPort: 5000
