{% extends "base.html" %}
{% block content %}
<h1>Matches</h1>
<form class="filter" method="get">
    <input name="league" placeholder="Filter by league" value="{{ league }}">
    <button type="submit">Search</button>
</form>
<div class="card">
<table>
    <tr><th>Source</th><th>League</th><th>Home</th><th>Away</th><th>Score</th><th>Date</th></tr>
    {% for m in matches %}
    <tr>
        <td>{{ m.source }}</td><td>{{ m.league }}</td><td>{{ m.home_team }}</td><td>{{ m.away_team }}</td>
        <td>{{ m.home_goals }} - {{ m.away_goals }}</td><td>{{ m.match_date }}</td>
    </tr>
    {% endfor %}
</table>
</div>
{% endblock %}
